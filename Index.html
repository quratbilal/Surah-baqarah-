<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --dur: 0.55s;
  --ease: cubic-bezier(0.34, 1.4, 0.64, 1);
}

body {
font-family: ‘Nunito’, sans-serif;
background: #f5f0e8;
min-height: 100vh;
overflow: hidden;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

/* ───── BOOK WRAPPER ───── */
#book-wrap {
width: min(700px, 98vw);
height: min(520px, 96vh);
position: relative;
perspective: 2000px;
}

/* ───── PAGE ───── */
.page {
position: absolute;
inset: 0;
border-radius: 24px;
overflow: hidden;
display: none;
flex-direction: column;
box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.1);
}
.page.active {
display: flex;
animation: pageIn var(–dur) var(–ease);
}
.page.out {
animation: pageOut 0.35s ease forwards;
}
@keyframes pageIn {
from { opacity:0; transform: scale(0.93) translateY(18px); }
to   { opacity:1; transform: scale(1) translateY(0); }
}
@keyframes pageOut {
from { opacity:1; transform: scale(1); }
to   { opacity:0; transform: scale(0.95); }
}

/* ───── PAGE HEADER ───── */
.page-header {
padding: 14px 20px 10px;
text-align: center;
position: relative;
flex-shrink: 0;
}
.page-header::after {
content:’’;
position: absolute;
bottom: 0; left: 10%; right: 10%;
height: 1.5px;
background: rgba(255,255,255,0.35);
border-radius: 2px;
}
.verse-badge {
display: inline-block;
background: rgba(255,255,255,0.28);
border: 1.5px solid rgba(255,255,255,0.45);
border-radius: 20px;
font-size: 11px;
font-weight: 800;
letter-spacing: 1.5px;
text-transform: uppercase;
color: white;
padding: 3px 14px;
margin-bottom: 6px;
}
.page-title {
font-size: clamp(17px, 3.5vw, 22px);
font-weight: 900;
color: white;
text-shadow: 0 2px 8px rgba(0,0,0,0.15);
line-height: 1.25;
}

/* ───── SCENE AREA ───── */
.scene {
flex: 1;
display: flex;
align-items: flex-end;
padding: 0 16px 8px;
position: relative;
overflow: hidden;
}

/* ───── GROUND ───── */
.ground {
position: absolute;
bottom: 0; left: 0; right: 0;
height: 48px;
border-radius: 0 0 4px 4px;
}

/* ───── CHARACTER ───── */
.character-wrap {
display: flex;
flex-direction: column;
align-items: center;
position: relative;
z-index: 3;
flex-shrink: 0;
}
.character-name {
font-size: 11px;
font-weight: 800;
margin-top: 4px;
letter-spacing: 0.5px;
}
.char-svg {
width: clamp(60px, 11vw, 88px);
height: auto;
filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
animation: charBob 3s ease-in-out infinite;
}
.char-svg.ayesha-char { animation-delay: -1.5s; }
@keyframes charBob {
0%,100% { transform: translateY(0); }
50%      { transform: translateY(-6px); }
}

/* ───── MIDDLE SCENE ───── */
.scene-middle {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 6px;
z-index: 2;
padding: 0 8px;
}
.scene-emoji-row {
font-size: clamp(22px, 5vw, 34px);
display: flex;
gap: 8px;
animation: floatEmojis 4s ease-in-out infinite alternate;
}
@keyframes floatEmojis {
from { transform: translateY(0); }
to   { transform: translateY(-6px); }
}
.arabic-text {
font-family: ‘Amiri’, serif;
font-size: clamp(18px, 4vw, 28px);
font-weight: 700;
color: white;
text-shadow: 0 2px 12px rgba(0,0,0,0.2);
direction: rtl;
text-align: center;
}

/* ───── DIALOGUE SECTION ───── */
.dialogue-section {
background: white;
border-radius: 0 0 24px 24px;
padding: 10px 14px 12px;
display: flex;
flex-direction: column;
gap: 7px;
flex-shrink: 0;
box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
}

.bubble-row {
display: flex;
align-items: flex-start;
gap: 8px;
}
.bubble-row.ayesha-row { flex-direction: row-reverse; }

.avatar-circle {
width: 32px; height: 32px;
border-radius: 50%;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
font-size: 16px;
font-weight: 900;
color: white;
box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.speech-bubble {
border-radius: 16px;
padding: 7px 12px;
font-size: clamp(11px, 2.2vw, 13px);
font-weight: 600;
line-height: 1.5;
max-width: 75%;
position: relative;
animation: bubblePop 0.5s var(–ease) both;
color: #222;
}
.speech-bubble.uzair-bubble {
background: #EEF4FF;
border: 1.5px solid #C5D8FF;
border-top-left-radius: 4px;
animation-delay: 0.2s;
}
.speech-bubble.ayesha-bubble {
background: #FFF0F5;
border: 1.5px solid #FFD0E8;
border-top-right-radius: 4px;
animation-delay: 0.5s;
text-align: right;
}
@keyframes bubblePop {
from { opacity:0; transform: scale(0.85) translateY(8px); }
to   { opacity:1; transform: scale(1) translateY(0); }
}

/* ───── LESSON BOX ───── */
.lesson-box {
border-radius: 12px;
padding: 7px 12px;
font-size: clamp(10px, 1.9vw, 12px);
font-weight: 700;
line-height: 1.5;
animation: bubblePop 0.5s var(–ease) 0.7s both;
}
.lesson-label {
font-size: 10px;
font-weight: 900;
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 2px;
}

/* ───── NAV ───── */
#nav {
position: fixed;
bottom: 18px;
left: 50%;
transform: translateX(-50%);
display: flex;
align-items: center;
gap: 12px;
z-index: 100;
}
.nav-btn {
width: 46px; height: 46px;
border-radius: 50%;
border: none;
background: white;
box-shadow: 0 4px 16px rgba(0,0,0,0.14);
font-size: 20px;
cursor: pointer;
transition: all 0.2s;
display: flex; align-items: center; justify-content: center;
}
.nav-btn:hover { transform: scale(1.12); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.nav-counter {
background: white;
border-radius: 20px;
padding: 6px 16px;
font-size: 13px;
font-weight: 800;
color: #444;
box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}

/* ───── PROGRESS DOTS ───── */
#progress {
position: fixed;
top: 14px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 5px;
z-index: 100;
flex-wrap: wrap;
justify-content: center;
max-width: 90vw;
}
.pdot {
width: 7px; height: 7px;
border-radius: 50%;
background: rgba(0,0,0,0.15);
cursor: pointer;
transition: all 0.3s;
}
.pdot.active { background: #555; transform: scale(1.5); }

/* ───── DECORATIVE SHAPES PER PAGE ───── */
.deco-circle {
position: absolute;
border-radius: 50%;
opacity: 0.12;
pointer-events: none;
}
</style>

// Extract a simple hex accent from gradient string
function accentFromGrad(grad) {
  const match = grad.match(/#[0-9A-Fa-f]{6}/);
  return match ? match[0] : '#7986CB';
}

// Build all page elements
const bookWrap = document.getElementById('book-wrap');
const progressEl = document.getElementById('progress');

pages.forEach((p, i) => {
  const accent = accentFromGrad(p.headerGrad);

  // Progress dot
  const dot = document.createElement('div');
  dot.className = 'pdot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  progressEl.appendChild(dot);

  // Page
  const page = document.createElement('div');
  page.className = 'page' + (i === 0 ? ' active' : '');
  page.style.background = p.bgGrad;

  page.innerHTML = `
    <!-- Header -->
    <div class="page-header" style="background:${p.headerGrad};">
      <div class="deco-circle" style="width:120px;height:120px;top:-40px;right:-30px;background:white;"></div>
      <div class="verse-badge">${p.verseTag}</div>
      <div class="page-title">${p.title.replace(/\n/g,'<br>')}</div>
    </div>

    <!-- Scene -->
    <div class="scene">
      <div class="deco-circle" style="width:160px;height:160px;bottom:-50px;left:-50px;background:${accent};"></div>
      <div class="deco-circle" style="width:100px;height:100px;top:10px;right:30px;background:${accent};"></div>

      <!-- Uzair -->
      <div class="character-wrap">
        ${uzairSVG(accent)}
        <div class="character-name" style="color:${accent}">Uzair</div>
      </div>

      <!-- Middle -->
      <div class="scene-middle">
        <div class="scene-emoji-row">${p.emojis.map(e=>`<span>${e}</span>`).join('')}</div>
        ${p.arabic ? `<div class="arabic-text" style="color:${accent}">${p.arabic}</div>` : ''}
      </div>

      <!-- Ayesha -->
      <div class="character-wrap">
        ${ayeshaSVG(accent)}
        <div class="character-name" style="color:${accent}">Ayesha</div>
      </div>

      <!-- Ground -->
      <div class="ground" style="background:${p.groundColor};opacity:0.35;"></div>
    </div>

    <!-- Dialogue -->
    <div class="dialogue-section">
      <div class="bubble-row">
        <div class="avatar-circle" style="background:${accent}">U</div>
        <div class="speech-bubble uzair-bubble">${p.uzair}</div>
      </div>
      <div class="bubble-row ayesha-row">
        <div class="avatar-circle" style="background:#F06292">A</div>
        <div class="speech-bubble ayesha-bubble">${p.ayesha}</div>
      </div>
      <div class="lesson-box" style="background:${p.lessonBg}; border-left: 4px solid ${p.lessonColor}">
        <div class="lesson-label" style="color:${p.lessonColor}">✦ Lesson</div>
        <div style="color:${p.lessonColor}">${p.lesson}</div>
      </div>
    </div>
  `;

  bookWrap.appendChild(page);
});

// Navigation
let current = 0;
const allPages = document.querySelectorAll('.page');
const allDots  = document.querySelectorAll('.pdot');
const total    = pages.length;

function updateUI() {
  document.getElementById('counter').textContent = `${current+1} / ${total}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === total - 1;
  allDots.forEach((d,i) => d.classList.toggle('active', i === current));
}

function goTo(idx) {
  allPages[current].classList.remove('active');
  allPages[current].classList.add('out');
  setTimeout(() => allPages[current < idx ? current : idx + 1]?.classList.remove('out'), 350);
  const prev = current;
  current = idx;
  setTimeout(() => {
    allPages[prev].classList.remove('out');
    allPages[current].classList.add('active');
    updateUI();
  }, 200);
}

function go(dir) {
  const next = current + dir;
  if (next >= 0 && next < total) goTo(next);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft')  go(-1);
});

// Touch/swipe
let tx = 0;
document.addEventListener('touchstart', e => tx = e.touches[0].clientX, {passive:true});
document.addEventListener('touchend',   e => {
  const diff = tx - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 45) go(diff > 0 ? 1 : -1);
}, {passive:true});

updateUI();
</script>
